<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investasi Simulator Multiplayer - Pusher</title>
    <!-- Library Chart.js dan Pusher -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://pusher.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        .flex-box { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .card { background: #2d2d2d; padding: 15px; border-radius: 6px; width: 30%; text-align: center; }
        .chart-container { margin: 20px 0; background: #2d2d2d; padding: 15px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
        input, button { padding: 10px; border-radius: 4px; border: none; font-size: 16px; }
        input { background: #333; color: #fff; flex: 1; }
        button { cursor: pointer; font-weight: bold; }
        .btn-buy { background: #2ecc71; color: white; }
        .btn-sell { background: #e74c3c; color: white; }
        .btn-reset { background: #f39c12; color: white; margin-left: auto; }
        .log-box { background: #2d2d2d; padding: 10px; border-radius: 6px; margin-top: 20px; font-size: 14px; max-height: 100px; overflow-y: auto; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Investasi Simulator (Multiplayer via Pusher)</h2>
    <p>Pemain: <strong id="display-username">-</strong></p>

    <div class="flex-box">
        <div class="card">
            <h3>Harga Aset Global</h3>
            <p id="price-display">1.000 Poin/Lot</p>
        </div>
        <div class="card">
            <h3>Saldo Poin Anda</h3>
            <p id="points-display">1.000.000</p>
        </div>
        <div class="card">
            <h3>Aset Dimiliki</h3>
            <p id="shares-display">0 Lot</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="marketChart"></canvas>
    </div>

    <div class="controls">
        <input type="number" id="point-input" placeholder="Masukkan jumlah poin..." min="1">
        <button class="btn-buy" onclick="handleTransaction('buy')">BELI</button>
        <button class="btn-sell" onclick="handleTransaction('sell')">JUAL</button>
        <button class="btn-reset" onclick="resetPoints()">RESET POIN</button>
    </div>

    <div class="log-box" id="log-box">
        <div>Sistem diaktifkan. Menunggu aktivitas pasar global...</div>
    </div>
</div>

<script>
    // === KONFIGURASI PUSHER ANDA ===
    const PUSHER_KEY = '5ca56d4bc80a32a94ad9'; 
    const PUSHER_CLUSTER = 'ap1';

    // === IDENTITAS USER ===
    let username = localStorage.getItem('push_username');
    if (!username) {
        username = prompt("Masukkan nama pengguna Anda untuk multipemain:") || "Trader_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('push_username', username);
    }
    document.getElementById('display-username').innerText = username;

    // === INTEGRASI DATA LOKAL USER & PASAR ===
    let userPoints = parseFloat(localStorage.getItem('user_points')) || 1000000;
    let userShares = parseFloat(localStorage.getItem('user_shares')) || 0;
    let currentPrice = parseFloat(localStorage.getItem('market_price')) || 1000;
    let priceHistory = JSON.parse(localStorage.getItem('price_history')) || [1000];

    // === INISIALISASI PUSHER ===
    // Menggunakan authorizer bawaan untuk memintas otentikasi demi kebutuhan client-side statis di GitHub Pages
    const pusher = new Pusher(PUSHER_KEY, { 
        cluster: PUSHER_CLUSTER,
        userAuthentication: { endpoint: null },
        channelAuthorization: { 
            endpoint: null,
            transport: 'ajax',
            customHandler: function(params, callback) {
                callback(null, { auth: PUSHER_KEY + ":" + Math.random().toString(36).substring(2) });
            }
        }
    });

    // Client Events mewajibkan nama channel diawali kata "private-"
    const channel = pusher.subscribe('private-market-channel');

    // Mendengarkan pembaruan pasar dari pemain lain secara langsung
    channel.bind('client-market-update', function(data) {
        currentPrice = data.newPrice;
        priceHistory = data.history;
        
        // Sinkronisasi ke memori lokal browser agar pas direfresh tidak hilang
        localStorage.setItem('market_price', currentPrice);
        localStorage.setItem('price_history', JSON.stringify(priceHistory));

        // Log aktivitas pemain ke layar
        const logBox = document.getElementById('log-box');
        const newLog = document.createElement('div');
        newLog.innerText = `[Pasar] ${data.user} baru saja melakukan ${data.action.toUpperCase()}. Harga baru: ${currentPrice}`;
        logBox.appendChild(newLog);
        logBox.scrollTop = logBox.scrollHeight;

        updateUI();
        updateChart();
    });

    // === ALGORITMA FLUKTUASI HARGA BERBASIS AKSI PEMAIN ===
    function calculateNewPrice(action, pointsUsed) {
        const impactFactor = pointsUsed / 10000000; // Skala dampak transaksi terhadap harga pasar
        const randomFluctuation = (Math.random() - 0.5) * 0.04; // Fluktuasi acak alami ±2%
        
        let percentageChange = randomFluctuation;
        if (action === 'buy') {
            percentageChange += Math.min(0.10, impactFactor); // Maksimal naik 10% per beli
        } else if (action === 'sell') {
            percentageChange -= Math.min(0.10, impactFactor); // Maksimal turun 10% per jual
        }

        let newPrice = Math.round(currentPrice * (1 + percentageChange));
        if (newPrice < 10) newPrice = 10; // Mencegah harga menjadi minus
        return newPrice;
    }

    // === LOGIKA TRANSAKSI ===
    function handleTransaction(type) {
        const inputVal = parseFloat(document.getElementById('point-input').value);
        if (!inputVal || inputVal <= 0) {
            alert("Masukkan jumlah poin yang valid!");
            return;
        }

        if (type === 'buy') {
            if (inputVal > userPoints) {
                alert("Poin Anda tidak mencukupi!");
                return;
            }
            const boughtShares = inputVal / currentPrice;
            userPoints -= inputVal;
            userShares += boughtShares;
        } else if (type === 'sell') {
            const sharesToSell = inputVal / currentPrice;
            if (sharesToSell > userShares) {
                alert("Jumlah aset Anda tidak mencukupi!");
                return;
            }
            userPoints += inputVal;
            userShares -= sharesToSell;
        }

        // Hitung harga baru secara global
        const nextPrice = calculateNewPrice(type, inputVal);
        priceHistory.push(nextPrice);
        if (priceHistory.length > 20) priceHistory.shift();

        // Simpan data pribadi & pasar ke memori browser
        localStorage.setItem('user_points', userPoints);
        localStorage.setItem('user_shares', userShares);
        localStorage.setItem('market_price', nextPrice);
        localStorage.setItem('price_history', JSON.stringify(priceHistory));

        // Kirim perubahan pasar ke Pusher agar semua pemain mendengarnya secara instan
        channel.trigger('client-market-update', {
            newPrice: nextPrice,
            history: priceHistory,
            user: username,
            action: type
        });

        updateUI();
        
        // Auto-reload otomatis sesuai permintaan Anda
        setTimeout(() => {
            window.location.reload();
        }, 300);
    }

    function resetPoints() {
        if (confirm("Reset poin Anda menjadi 1.000.000?")) {
            localStorage.setItem('user_points', 1000000);
            localStorage.setItem('user_shares', 0);
            window.location.reload();
        }
    }

    // === UPDATE TAMPILAN & GRAFIK ===
    function updateUI() {
        document.getElementById('price-display').innerText = currentPrice.toLocaleString('id-ID') + " Poin/Lot";
        document.getElementById('points-display').innerText = Math.round(userPoints).toLocaleString('id-ID');
        document.getElementById('shares-display').innerText = userShares.toFixed(4) + " Lot";
    }

    let marketChart;
    function updateChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        const labels = priceHistory.map((_, index) => `T-${priceHistory.length - index - 1}`);
        
        if (marketChart) marketChart.destroy(); // Bersihkan grafik lama

        marketChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Grafik Pergerakan Pasar Real-Time',
                    data: priceHistory,
                    borderColor: '#2ecc71',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#fff' } }
                }
            }
        });
    }

    // Eksekusi awal saat web dibuka
    updateUI();
    updateChart();
</script>

</body>
</html>

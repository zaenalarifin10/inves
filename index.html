<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investasi Simulator Multiplayer - Ably</title>
    <!-- Memuat Library Terverifikasi -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://ably.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        .flex-box { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .card { background: #2d2d2d; padding: 15px; border-radius: 6px; width: 30%; text-align: center; }
        .chart-container { margin: 20px 0; background: #2d2d2d; padding: 15px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
        input, button { padding: 10px; border-radius: 4px; border: none; font-size: 16px; }
        input { background: #333; color: #fff; flex: 1; }
        button { cursor: pointer; font-weight: bold; }
        .btn-buy { background: #2ecc71; color: white; }
        .btn-sell { background: #e74c3c; color: white; }
        .btn-reset { background: #f39c12; color: white; margin-left: auto; }
        .log-box { background: #2d2d2d; padding: 10px; border-radius: 6px; margin-top: 20px; font-size: 14px; max-height: 100px; overflow-y: auto; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Investasi Simulator (Multiplayer via Ably)</h2>
    <p>Pemain: <strong id="display-username">-</strong></p>

    <div class="flex-box">
        <div class="card">
            <h3>Harga Pasar Global</h3>
            <p id="price-display">Loading...</p>
        </div>
        <div class="card">
            <h3>Saldo Poin Anda</h3>
            <p id="points-display">1.000.000</p>
        </div>
        <div class="card">
            <h3>Aset Dimiliki</h3>
            <p id="shares-display">0 Lot</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="marketChart"></canvas>
    </div>

    <div class="controls">
        <input type="number" id="point-input" placeholder="Masukkan jumlah poin..." min="1">
        <button class="btn-buy" onclick="handleTransaction('buy')">BELI</button>
        <button class="btn-sell" onclick="handleTransaction('sell')">JUAL</button>
        <button class="btn-reset" onclick="resetPoints()">RESET GAME</button>
    </div>

    <div class="log-box" id="log-box">
        <div>Sistem diaktifkan. Sinkronisasi dengan pasar awan...</div>
    </div>
</div>

<script>
    // === KONFIGURASI ABLY CHANNELS ROOT ===
    const ABLY_API_KEY = 'zpRGCw.yfkaJA:CFtNgfcPFALqLqx8QYqebNCZs3hDHh7_moQjC2l4YpI'; 

    // === IDENTITAS USER ===
    let username = localStorage.getItem('ably_username');
    if (!username) {
        username = prompt("Masukkan nama pengguna Anda untuk multipemain:") || "Trader_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('ably_username', username);
    }
    document.getElementById('display-username').innerText = username;

    // === INISIALISASI DATA DOMPET LOKAL ===
    let userPoints = parseFloat(localStorage.getItem('user_points'));
    if (isNaN(userPoints) || userPoints === null) userPoints = 1000000;
    let userShares = parseFloat(localStorage.getItem('user_shares')) || 0;
    
    // Default fallback jika belum ada data pasar di awan
    let currentPrice = 1000;
    let priceHistory = [1000];
    let marketChart = null;

    // === KONEKSI KLIEN ABLY REALTIME ===
    const ably = new Ably.Realtime({ key: ABLY_API_KEY });
    const channel = ably.channels.get('investasi-pasar-global', { params: { rewind: '1' } }); // Rewind mengambil data terakhir saat refresh

    // Ambil histori pesan terakhir dari server Ably agar grafik tidak hilang/kosong saat di-refresh
    channel.history(function(err, page) {
        if (!err && page.items.length > 0) {
            const data = page.items[0].data;
            currentPrice = data.newPrice;
            priceHistory = data.history;
        }
        updateUI();
        updateChart();
    });

    // Mendengarkan siaran transaksi dari pemain lain di internet secara live
    channel.subscribe('market-update', function(message) {
        const data = message.data;
        
        // Ambil data baru dari internet
        currentPrice = data.newPrice;
        priceHistory = data.history;

        // Cetak aktivitas pemain lain ke kotak log
        const logBox = document.getElementById('log-box');
        const newLog = document.createElement('div');
        newLog.innerText = `[Pasar] ${data.user} melakukan ${data.action.toUpperCase()} sebesar ${data.points.toLocaleString('id-ID')} poin. Harga baru: ${currentPrice}`;
        logBox.appendChild(newLog);
        logBox.scrollTop = logBox.scrollHeight;

        updateUI();
        updateChart();
    });

    // === ALGORITMA FLUKTUASI HARGA INVESTASI ===
    function calculateNewPrice(action, pointsUsed) {
        const impactFactor = pointsUsed / 5000000; 
        const randomFluctuation = (Math.random() - 0.5) * 0.05; // Sentimen acak ±2.5%
        
        let percentageChange = randomFluctuation;
        if (action === 'buy') {
            percentageChange += Math.min(0.12, impactFactor); // Maksimal naik 12% per pembelian
        } else if (action === 'sell') {
            percentageChange -= Math.min(0.12, impactFactor); // Maksimal turun 12% per penjualan
        }

        let newPrice = Math.round(currentPrice * (1 + percentageChange));
        if (newPrice < 10) newPrice = 10; // Batas bawah harga agar tidak 0
        return newPrice;
    }

    // === LOGIKA TRANSAKSI (BUY / SELL) ===
    function handleTransaction(type) {
        const inputVal = parseFloat(document.getElementById('point-input').value);
        if (isNaN(inputVal) || inputVal <= 0) {
            alert("Masukkan jumlah poin yang valid!");
            return;
        }

        if (type === 'buy') {
            if (inputVal > userPoints) {
                alert("Poin Anda tidak mencukupi!");
                return;
            }
            const boughtShares = inputVal / currentPrice;
            userPoints -= inputVal;
            userShares += boughtShares;
        } else if (type === 'sell') {
            const sharesToSell = inputVal / currentPrice;
            if (sharesToSell > userShares) {
                alert("Jumlah kepemilikan aset Anda tidak mencukupi!");
                return;
            }
            userPoints += inputVal;
            userShares -= sharesToSell;
        }

        // Hitung pergerakan harga global pasca transaksi
        const nextPrice = calculateNewPrice(type, inputVal);
        priceHistory.push(nextPrice);
        if (priceHistory.length > 20) priceHistory.shift();

        // Simpan data dompet pribadi saja ke memori browser
        localStorage.setItem('user_points', userPoints);
        localStorage.setItem('user_shares', userShares);

        // Siarkan data ke awan Ably agar semua pemain menerima update harga pasar
        channel.publish('market-update', {
            newPrice: nextPrice,
            history: priceHistory,
            user: username,
            action: type,
            points: inputVal
        });

        updateUI();

        // Delay singkat 400ms agar paket data terkirim penuh ke server Ably sebelum auto-reload dipicu
        setTimeout(() => {
            window.location.reload();
        }, 400);
    }

    function resetPoints() {
        if (confirm("Reset seluruh data game dan poin Anda kembali ke 1.000.000?")) {
            localStorage.clear();
            window.location.reload();
        }
    }

    // === RE-RENDER UI & GRAFIK ===
    function updateUI() {
        document.getElementById('price-display').innerText = currentPrice.toLocaleString('id-ID') + " Poin/Lot";
        document.getElementById('points-display').innerText = Math.round(userPoints).toLocaleString('id-ID');
        document.getElementById('shares-display').innerText = userShares.toFixed(4) + " Lot";
    }

    function updateChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        const labels = priceHistory.map((_, index) => `T-${priceHistory.length - index - 1}`);
        
        if (marketChart) marketChart.destroy(); // Menghapus instansi grafik lama untuk mencegah penumpukan memori

        marketChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Pergerakan Harga Pasar Saham Real-Time',
                    data: priceHistory,
                    borderColor: '#2ecc71',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.15
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#fff' } }
                }
            }
        });
    }
</script>

</body>
</html>

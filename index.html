<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investasi Simulator Multiplayer - Ably</title>
    <!-- Menghubungkan CSS Terpisah -->
    <link rel="stylesheet" href="style.css">
    <!-- Memuat Library CDN Utama -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://ably.com"></script>
</head>
<body>

<div class="container">
    <h2>Investasi Simulator (Multiplayer via Ably)</h2>
    <p>Pemain: <strong id="display-username">-</strong></p>

    <div class="flex-box">
        <div class="card">
            <h3>Harga Pasar Global</h3>
            <p id="price-display">Menghubungkan...</p>
        </div>
        <div class="card">
            <h3>Saldo Poin Anda</h3>
            <p id="points-display">1.000.000</p>
        </div>
        <div class="card">
            <h3>Aset Dimiliki</h3>
            <p id="shares-display">0 Lot</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="marketChart"></canvas>
    </div>

    <div class="controls">
        <input type="number" id="point-input" placeholder="Masukkan jumlah poin..." min="1">
        <button class="btn-buy" onclick="handleTransaction('buy')">BELI</button>
        <button class="btn-sell" onclick="handleTransaction('sell')">JUAL</button>
        <button class="btn-reset" onclick="resetPoints()">RESET GAME</button>
    </div>

    <div class="log-box" id="log-box">
        <div>[Sistem] Mengaktifkan mesin simulator...</div>
    </div>
</div>

<script>
    const ABLY_API_KEY = 'zpRGCw.yfkaJA:CFtNgfcPFALqLqx8QYqebNCZs3hDHh7_moQjC2l4YpI'; 

    let username = localStorage.getItem('ably_username');
    if (!username) {
        username = prompt("Masukkan nama pengguna Anda untuk multipemain:") || "Trader_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('ably_username', username);
    }
    document.getElementById('display-username').innerText = username;

    // === MEMORI AKUN LOKAL ===
    let userPoints = parseFloat(localStorage.getItem('user_points'));
    if (isNaN(userPoints) || userPoints === null) userPoints = 1000000;
    let userShares = parseFloat(localStorage.getItem('user_shares')) || 0;
    
    // Fallback data pasar default awal
    let currentPrice = 1000;
    let priceHistory = [1000];
    let marketChart = null;

    // === MEMBUAT KONEKSI KE PELADEN GLOBAL ABLY ===
    const ably = new Ably.Realtime({ key: ABLY_API_KEY });
    const channel = ably.channels.get('investasi-pasar-global');

    // Callback saat terhubung sukses ke satelit Ably
    ably.connection.on('connected', function() {
        writeLog("[Sistem] Sukses jabat tangan dengan jaringan Ably Cloud!");
        
        // AMBIL DATA SEJARAH TERBARU DARI CLOUD (FIXED BUG)
        channel.history({ limit: 1 }, function(err, page) {
            if (!err && page && page.items && page.items.length > 0) {
                // Sesuai dokumentasi Ably, item terakhir adalah item ke-0
                const historicalData = page.items[0].data; 
                if (historicalData && historicalData.newPrice && Array.isArray(historicalData.history)) {
                    currentPrice = historicalData.newPrice;
                    priceHistory = historicalData.history;
                }
            }
            updateUI();
            updateChart();
        });
    });

    ably.connection.on('failed', function() {
        alert("Sambungan data Ably diblokir atau limit kuota tercapai.");
    });

    // Menerima pancaran sinyal transaksi dari seluruh dunia
    channel.subscribe('market-update', function(message) {
        const data = message.data;
        if (data.user === username) return; // Lewati ketukan kita sendiri
        
        currentPrice = data.newPrice;
        priceHistory = data.history;

        writeLog(`[Pasar] ${data.user} meluncurkan aksi ${data.action.toUpperCase()} sebesar ${data.points.toLocaleString('id-ID')} poin. Harga baru: ${currentPrice}`);
        updateUI();
        updateChart();
    });

    // === ALGORITMA DINAMIS HARGA INVESTASI P2P ===
    function calculateNewPrice(action, pointsUsed) {
        const impactFactor = pointsUsed / 5000000; 
        const randomFluctuation = (Math.random() - 0.5) * 0.05; // Sentimen pasar ±2.5%
        
        let percentageChange = randomFluctuation;
        if (action === 'buy') {
            percentageChange += Math.min(0.12, impactFactor); 
        } else if (action === 'sell') {
            percentageChange -= Math.min(0.12, impactFactor); 
        }

        let newPrice = Math.round(currentPrice * (1 + percentageChange));
        if (newPrice < 10) newPrice = 10; 
        return newPrice;
    }

    // === LOGIKA TRANSAKSI UTAMA (BELI / JUAL) ===
    function handleTransaction(type) {
        const inputElement = document.getElementById('point-input');
        const inputVal = parseFloat(inputElement.value);

        if (isNaN(inputVal) || inputVal <= 0) {
            alert("Masukkan jumlah angka poin investasi yang valid!");
            return;
        }

        if (type === 'buy') {
            if (inputVal > userPoints) {
                alert("Saldo poin simulasi Anda tidak mencukupi!");
                return;
            }
            const boughtShares = inputVal / currentPrice;
            userPoints -= inputVal;
            userShares += boughtShares;
        } else if (type === 'sell') {
            const sharesToSell = inputVal / currentPrice;
            if (sharesToSell > userShares) {
                alert("Kepemilikan Lot aset Anda tidak memadai!");
                return;
            }
            userPoints += inputVal;
            userShares -= sharesToSell;
        }

        // Kalkulasi lompatan harga global baru
        currentPrice = calculateNewPrice(type, inputVal);
        priceHistory.push(currentPrice);
        if (priceHistory.length > 20) priceHistory.shift();

        // Amankan dompet ke memori browser lokal
        localStorage.setItem('user_points', userPoints);
        localStorage.setItem('user_shares', userShares);

        updateUI();
        updateChart();
        inputElement.value = ''; // Mengosongkan form input otomatis setelah klik

        // SINKRONISASI RELOAD: Kirim ke Ably dan biarkan reload berjalan di dalam callback sukses
        channel.publish('market-update', {
            newPrice: currentPrice,
            history: priceHistory,
            user: username,
            action: type,
            points: inputVal
        }, function(err) {
            if (!err) {
                console.log("Sinkronisasi cloud aman.");
                window.location.reload(); // Auto-reload dieksekusi HANYA setelah Ably sukses menyimpan data
            } else {
                alert("Gagal menyinkronkan data ke jaringan internet.");
            }
        });
    }

    function resetPoints() {
        if (confirm("Kosongkan memori permainan dan muat ulang saldo awal 1.000.000?")) {
            localStorage.clear();
            window.location.reload();
        }
    }

    // === FUNGSI RENDER KOMPONEN UI ===
    function updateUI() {
        document.getElementById('price-display').innerText = currentPrice.toLocaleString('id-ID') + " Poin/Lot";
        document.getElementById('points-display').innerText = Math.round(userPoints).toLocaleString('id-ID');
        document.getElementById('shares-display').innerText = userShares.toFixed(4) + " Lot";
    }

    function updateChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        const labels = priceHistory.map((_, index) => `T-${priceHistory.length - index - 1}`);
        
        if (marketChart) marketChart.destroy(); 

        marketChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Pergerakan Harga Pasar Saham Global',
                    data: priceHistory,
                    borderColor: '#2ecc71',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.15
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#fff' } }
                }
            }
        });
    }

    function writeLog(text) {
        const logBox = document.getElementById('log-box');
        const element = document.createElement('div');
        element.innerText = text;
        logBox.appendChild(element);
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Pemuatan visual dasar saat sistem dinyalakan
    updateUI();
    updateChart();
</script>

</body>
</html>
